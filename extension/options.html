<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>YouTube Transcript Search — Settings</title>
    <style>
      :root {
        --bg: #0f0f10;
        --panel: #161616;
        --border: #2a2a2a;
        --text: #f1f1f1;
        --muted: #a8a8a8;
        --accent: #3ea6ff;
        --error: #cb2431;
        --ok: #2ea44f;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 18px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 10px;
      }
      .help {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }
      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      input[type="url"],
      input[type="text"] {
        padding: 10px 12px;
        border-radius: 10px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        outline: none;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 12px 0 12px;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-weight: 800;
        cursor: pointer;
      }
      button.primary {
        border-color: rgba(62, 166, 255, 0.6);
        color: var(--accent);
      }
      button.danger {
        border-color: rgba(203, 36, 49, 0.6);
        color: #ffb3b3;
      }
      .msg {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        white-space: pre-wrap;
      }
      .msg.ok {
        color: var(--ok);
        font-weight: 900;
      }
      .msg.err {
        color: var(--error);
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Backend Settings</h1>
      <div class="help">
        Configure where the Flask API runs and (optionally) provide a YouTube Data API key for metadata
        during indexing.
      </div>

      <div class="row">
        <label for="apiBase">API base URL</label>
        <input id="apiBase" type="url" placeholder="http://localhost:5000" />
      </div>

      <div class="row">
        <label for="ytApiKey">YouTube Data API key (optional)</label>
        <input id="ytApiKey" type="text" placeholder="Paste API key or leave blank" />
      </div>

      <div class="btn-row">
        <button class="primary" id="testBtn" type="button">Test connection</button>
        <button class="danger" id="rebuildBtn" type="button">Rebuild index</button>
      </div>

      <div class="msg" id="msg"></div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
